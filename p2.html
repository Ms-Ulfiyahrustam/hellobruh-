<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>We CV - Your Name</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>We CV</h1>
            <p>Welcome to my online portfolio</p>
        </div>
    </header>

    <section id="about" class="section">
        <div class="container">
            <h2>About Me</h2>
            <p>Hi, I'm [Your Name]. I'm a passionate developer, designer, and tech enthusiast.</p>
        </div>
    </section>

    <section id="skills" class="section">
        <div class="container">
            <h2>Skills</h2>
            <ul>
            </ul>
        </div>
    </section>

    <section id="experience" class="section">
        <div class="container">
            <h2>Experience</h2>
            <ul>
                <li>Frontend Developer at ABC Corp (2022-2024)</li>
                <li>Backend Developer at XYZ Ltd (2020-2022)</li>
            </ul>
        </div>
    </section>

    <section id="contact" class="section">
        <div class="container">
            <h2>Contact</h2>
            <form id="contactForm">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
                <button type="submit">Send Message</button>
            </form>
        </div>
    </section>

    <footer>
        <div class="container">
            <p>&copy; 2026 [Your Name]. All rights reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
